name: gtec_capstone
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # 핵심 패키지
  auto_size_text: 3.0.0
  cached_network_image: 3.4.1
  collection: 1.19.1
  csv: 6.0.0
  dropdown_button2: 2.3.9
  flutter_animate: 4.5.0
  flutter_cache_manager: 3.4.1
  flutter_secure_storage: 9.2.2
  font_awesome_flutter: 10.7.0
  from_css_color: 2.0.0
  go_router: 12.1.3
  google_fonts: 6.1.0
  intl: 0.20.2
  json_path: 0.7.2
  page_transition: 2.1.0
  path_provider: 2.1.4
  provider: 6.1.2
  sqflite: ^2.3.3+1
  sqflite_common: ^2.3.3+1
  synchronized: 3.1.0
  timeago: ^3.6.1
  url_launcher: ^6.1.14
  url_launcher_android: ^6.0.20
  url_launcher_ios: ^6.1.4
  url_launcher_linux: ^3.0.1
  url_launcher_macos: ^3.0.1
  url_launcher_platform_interface: ^2.1.2
  url_launcher_web: ^2.1.2
  url_launcher_windows: ^3.0.1
  http: ^1.2.2

  # shared_preferences - Flutter 3.13.9 호환 구성
  shared_preferences: 2.0.17

  # 로컬 패키지
  ff_commons:
    path: ./dependencies/ff_commons
  ff_theme:
    path: ./dependencies/ff_theme
  xml_to_json_library_3xky21:
    path: ./dependencies/xml_to_json_library_3xky21

  uuid: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/rive_animations/
    - assets/pdfs/
    - assets/jsons/

  fonts:
    - family: 'wow'
      fonts:
        - asset: assets/fonts/Paperlogy-1Thin.ttf
          weight: 100
        - asset: assets/fonts/Paperlogy-2ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Paperlogy-3Light.ttf
          weight: 300
        - asset: assets/fonts/Paperlogy-4Regular.ttf
        - asset: assets/fonts/Paperlogy-5Medium.ttf
          weight: 500
        - asset: assets/fonts/Paperlogy-6SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Paperlogy-7Bold.ttf
          weight: 700
        - asset: assets/fonts/Paperlogy-8ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Paperlogy-9Black.ttf
          weight: 900
